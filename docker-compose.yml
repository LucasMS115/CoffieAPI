services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: coffie
      POSTGRES_PASSWORD: coffie_pass
      POSTGRES_DB: coffie_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/tmp/go-build
    environment:
      DATABASE_URL: postgres://coffie:coffie_pass@db:5432/coffie_dev?sslmode=disable
      API_PORT: "8080"
      GOMODCACHE: /go/pkg/mod
      GOCACHE: /tmp/go-build
      HOME: /home/appuser
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  go-mod-cache:
  go-build-cache:
