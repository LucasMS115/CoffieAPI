services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: coffie
      POSTGRES_PASSWORD: coffie_pass
      POSTGRES_DB: coffie_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://coffie:coffie_pass@db:5432/coffie_dev?sslmode=disable
      API_PORT: "8080"
    depends_on:
      db:
        condition: service_started

volumes:
  postgres_data:
